<!DOCTYPE html>
<html>

<head>
    <title>Multitube</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
        }

        .player {
            border: 1px solid #000;
            width: fit-content;
            height: fit-content;
        }

        .frame {
            border: 1px solid #000;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <span>履歴1</span>
    <select id="history1"></select>
    <span>履歴2</span>
    <select id="history2"></select>
    <br>
    <button id="doubleplay">同時再生</button>
    <select id="zoom">
        <option value="1.0" selected>×1.0</option>
        <option value="1.25">×1.25</option>
        <option value="1.5">×1.5</option>
        <option value="1.75">×1.75</option>
        <option value="2.0">×2.0</option>
    </select>
    <div class="player">
        <p>
            <input id="url1" type="text" size="9">
            <button id="play1">再生</button>
        </p>
        <iframe class="frame" id="frame1" width="300" height="225" title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <div class="player">
        <p>
            <input id="url2" type="text" size="9">
            <button id="play2">再生</button>
        </p>
        <iframe class="frame" id="frame2" width="300" height="225" title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <script>
        //履歴確認
        const history1 = localStorage.getItem('history1');
        const history2 = localStorage.getItem('history2');
        const url1 = [];
        const url2 = [];
        if (history1) {
            history1.split(',').forEach((o, num) => {
                const hisoption = document.createElement('option');
                hisoption.value = o;
                hisoption.text = o;
                url1.push(o);
                document.getElementById('history1').appendChild(hisoption);
                if (num == 0) {
                    document.getElementById('url1').value = o;
                    document.getElementById('url1').text = o;
                }
            });
        }
        if (history2) {
            history2.split(',').forEach((o, num) => {
                const hisoption = document.createElement('option');
                hisoption.value = o;
                hisoption.text = o;
                url2.push(o);
                document.getElementById('history2').appendChild(hisoption);
                if (num == 0) {
                    document.getElementById('url2').value = o;
                    document.getElementById('url2').text = o;
                }
            });
        }
        //プレーヤー設定
        function start(playerNum, videoId) {
            if (videoId !== "") {
                document.getElementById(`frame${playerNum}`).src = "https://www.youtube-nocookie.com/embed/" + videoId + "?autoplay=1&amp;mute=1";
                (playerNum == 1) ? url1.push(videoId) : url2.push(videoId);
                (playerNum == 1) ? localStorage.setItem('history1', url1.toString()) : localStorage.setItem('history2', url2.toString());
            }

        }
        function editUrl(url) {
            const start = url.indexOf('?v=');
            url = url.substr((start == -1) ? 0 : start + 3);
            return url;
        }
        for (let i = 1; i < 3; i++) {
            document.getElementById(`play${i}`).addEventListener('click', function () {
                start(i, editUrl(document.getElementById(`url${i}`).value));
            });
            document.getElementById(`history${i}`).addEventListener('change', (e) => {
                document.getElementById(`url${i}`).value = e.target.value;
                document.getElementById(`url${i}`).text = e.target.value;
            });
        }
        document.getElementById('doubleplay').addEventListener('click', function () {
            for (let i = 1; i < 3; i++) {
                start(i, editUrl(document.getElementById(`url${i}`).value));
            }
        });
        document.getElementById('zoom').addEventListener('change', (e) => {
            document.body.style.zoom = e.target.value;
            window.resizeTo(310 * e.target.value, 635 * e.target.value);
        });
    </script>
</body>

</html>
