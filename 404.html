<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
const path = location.pathname.split("/").filter(Boolean);

if (path.length === 2) {
    const type = path[0];
    const id = path[1];

    if (/^\d{14}$/.test(id)) {
        const date = id.slice(0, 8);
        location.replace(
            `https://smi.lmoniexp.bosai.go.jp/data/map_img/RealTimeImg/${type}/${date}/${id}.${type}.gif`
        );
    }
}
</script>
</head>
<body>
404
</body>
</html>
