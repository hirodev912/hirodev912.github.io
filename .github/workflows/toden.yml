name: Fetch TEPCO CSV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CSV
        run: |
          mkdir -p data
          curl -L https://www.tepco.co.jp/forecast/html/images/juyo-s1-j.csv \
            -o data/tepco.csv

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/tepco.csv
          git commit -m "update tepco csv" || exit 0
          git push

