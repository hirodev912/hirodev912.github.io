<!DOCTYPE html><html lang="ja"><head><title>のんのんびより画像ガチャ</title><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta charset="UTF-8"><style>body { margin: 0; padding: 0; } #picture { width: 100%; height: auto; }</style></head><body><img id="picture"><script>fetch("imagelist.json").then(r =>r.json()).then(list =>{ picture = document.getElementById("picture"); number = Math.floor(Math.random() * list.length); picture.src = list[number].media_urls; picture.title = list[number].text.substr(0, list[number].text.indexOf("h")); });</script></body></html>
