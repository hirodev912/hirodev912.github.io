<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>地震監視セット</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            margin: 0;
            color: #fff;
            background: #000;
            font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Code", monospace;
        }

        p {
            margin: 0;
            width: fit-content;
            height: fit-content;
        }

        #menu_top {
            display: flex;
            width: 100%;
            height: 18px;
        }

        #time {
            font-size: 18px;
        }

        #voices {
            height: 18px;
        }

        .content {
            position: relative;
            border: 1px solid #555;
            border-radius: 8px;
            width: fit-content;
            height: fit-content;
        }

        .nied_wrapper {
            width: 1056px;
            height: 400px;
            display: flex;
            flex-direction: row;
        }

        .nied_monitor {
            width: 352px;
            height: 400px;
            position: relative;
        }

        #eqlog,
        #usgslog,
        #tsunamilog {
            background: #000;
            display: block;
            width: fit-content;
            height: 400px;
            overflow: auto;
        }

        #eqlog,
        #usgslog {
            width: 420px;
        }

        #tsunamilog {
            min-width: 310px;
        }

        #map {
            width: 704px;
            height: 450px;
        }

        .loadimg {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: -1;
        }

        .eq_tokei {
            width: 223px;
            height: 223px;
            border: 1px solid #555;
            overflow: auto;
        }

        #eewtxt {
            position: absolute;
            width: 248px;
            height: 70px;
            z-index: 100;
            color: #fff;
            background: #333;
        }
    </style>
    <link rel="stylesheet" href="leaflet.css">
</head>

<body>
    <div id="menu_top">
        <p id="time"></p>
        <div id="menu">
            <img id="speaker" src="images/mute.png" height="18">
            <select id="voices"></select>
        </div>
        <button id="testspeech">テスト</button>
    </div>
    <div style="display: flex;">
        <div class="content" id="nied_kyoshin">
            <p>強震モニタ（地表・長周期地震動・予想震度＆予想円）</p>
            <div class="nied_wrapper">
                <div class="nied_monitor" id="nied_kyoshin1">
                    <img src="images/base_map_b.png" style="z-index: 0; position: absolute;" width="352" height="400">
                    <img id="nied_image1" style="z-index: 10; position: absolute;" width="352" height="400">
                    <img src="images/loading.gif" class="loadimg">
                </div>
                <div class="nied_monitor" id="nied_kyoshin2">
                    <img src="images/base_map_b.png" style="z-index: 0; position: absolute;" width="352" height="400">
                    <img id="nied_image2" style="z-index: 10; position: absolute;" width="352" height="400">
                    <img src="images/loading.gif" class="loadimg">
                </div>
                <div class="nied_monitor" id="nied_kyoshin3">
                    <img src="images/base_map_b.png" style="z-index: 0; position: absolute;" width="352" height="400">
                    <img id="nied_image3" style="z-index: 10; position: absolute;" width="352" height="400">
                    <img id="nied_image4" style="z-index: 20; position: absolute;" width="352" height="400">
                    <img src="images/loading.gif" class="loadimg">
                    <span id="eewtxt"></span>
                </div>
            </div>
        </div>
        <div class="content" id="eqinfo">
            <p>地震情報リスト（国内）</p>
            <span id="eqlog"></span>
            <img src="images/loading.gif" class="loadimg">
        </div>
        <div class="content" id="usgsinfo">
            <p>地震情報リスト（世界）</p>
            <div id="usgslog"></div>
            <img src="images/loading.gif" class="loadimg">
        </div>

    </div>
    <div style="display: flex;">
        <div class="content" id="eqmap">
            <p>震源分布図</p>
            <div id="map"></div>
            <img src="images/loading.gif" class="loadimg">
        </div>
        <div class="content" id="tsunamiinfo">
            <p>津波情報</p>
            <div id="tsunamilog" style="height: 450px;"></div>
            <img src="images/loading.gif" class="loadimg">
        </div>
        <div class="content">
            <p>統計情報</p>
            <div class="eq_tokei">
                <p>過去三日間の有感地震</p>
                <span id="count_today"></span>
            </div>
            <div class="eq_tokei">
                <p>過去一か月の発生回数</p>
                <span id="count_total"></span>
            </div>
        </div>
        <div class="content">
            <p>統計グラフ</p>
            <div class="eq_tokei">
                <p>日別発生回数推移</p>
                <canvas id="tokei_graph1" width="223" height="205"></canvas>
            </div>
            <div class="eq_tokei">
                <p>震度別発生率</p>
                <canvas id="tokei_graph2" width="223" height="205"></canvas>
            </div>
        </div>
        <div class="content">
            <br>
            <div class="eq_cumulative">
                <p>発生回数累積</p>
                <canvas id="tokei_graph3" width="223" height="205"></canvas>
            </div>
            <div class="eq_magnitude">
                <p>マグニチュード別発生率</p>
                <canvas id="tokei_graph4" width="223" height="205"></canvas>
            </div>
        </div>
    </div>
    <script src="setup.js" type="module"></script>
    <script src="leaflet.js"></script>
    <script src="nied_monitor.js" type="module"></script>
    <script src="eew.js" type="module"></script>
    <script src="eqmonitor.js" type="module"></script>
    <script src="tsunamimonitor.js" type="module"></script>
</body>

</html>
